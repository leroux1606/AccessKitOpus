# Copy this file into your consumer project at
# `.github/workflows/accessibility.yml` and adjust the placeholders.
#
# What it does
# ────────────
# 1. On every PR and on every push to `main`, runs an AccessKit scan
#    against your pre-deployed staging/production website.
# 2. Fails the job if any CRITICAL issues are found OR if the overall
#    score drops below 85.
# 3. On pull requests, posts a comment with the score and a link to
#    the full report.
#
# Prerequisites
# ─────────────
# • An AccessKit API key stored as the `ACCESSKIT_API_KEY` secret
#   (Repo settings → Secrets → Actions → New secret).
# • The `website-id` below — find it under the URL when viewing the
#   site in the dashboard, e.g. `/websites/wst_abc123`.
# • An Agency plan or higher on your AccessKit org.

name: Accessibility

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  accesskit-scan:
    runs-on: ubuntu-latest
    # Allow the job to post PR comments even when the scan gate fails.
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - id: scan
        uses: leroux1606/AccessKitOpus/github-action@main
        with:
          api-key: ${{ secrets.ACCESSKIT_API_KEY }}
          # Replace with your own website ID from the dashboard.
          website-id: wst_REPLACE_ME
          # Zero tolerance for critical WCAG violations.
          fail-on-critical: 0
          # Overall score must be ≥ 85.
          min-score: 85
          # Optional: point at a self-hosted deployment.
          # api-url: https://accesskit.yourcompany.com

      - name: Comment scan result on PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          SCAN_ID: ${{ steps.scan.outputs.scan-id }}
          SCAN_SCORE: ${{ steps.scan.outputs.score }}
          SCAN_STATUS: ${{ steps.scan.outputs.status }}
          SCAN_VIOLATIONS: ${{ steps.scan.outputs.violations }}
        with:
          script: |
            const { SCAN_ID, SCAN_SCORE, SCAN_STATUS, SCAN_VIOLATIONS } = process.env;
            const pass = '${{ job.status }}' === 'success';
            const emoji = pass ? '✅' : '⚠️';
            const body = [
              `### ${emoji} AccessKit scan ${SCAN_STATUS || 'unknown'}`,
              '',
              `| Metric | Value |`,
              `| --- | --- |`,
              `| Score | **${SCAN_SCORE || '—'}/100** |`,
              `| Total violations | ${SCAN_VIOLATIONS || 0} |`,
              `| Scan ID | \`${SCAN_ID || '—'}\` |`,
              '',
              SCAN_ID ? `[View full report](https://app.accesskit.dev/scans/${SCAN_ID})` : '',
            ].join('\n');

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });
